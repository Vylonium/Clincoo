<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clincoo - AI Agent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        html, body {
            height: 100dvh;
            height: -webkit-fill-available;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff; 
            color: #000000;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }

        .gradient-line {
            height: 1px;
            width: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(156,163,175,0.3) 50%, rgba(255,255,255,1) 100%);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #9ca3af;
            margin-left: 2px;
        }
        
        .typing-cursor > p:last-child {
            display: inline;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .shiny-text {
            background: linear-gradient(110deg, #000000 35%, #9ca3af 50%, #000000 65%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        .shimmer-search {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: linear-gradient(90deg, #6b7280 0%, #d1d5db 50%, #6b7280 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmerText 2s linear infinite;
            font-weight: 500;
            font-size: 0.95rem;
        }

        @keyframes shimmerText {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .hljs {
            background: transparent !important;
            padding: 0 !important;
        }
        
        .code-container::-webkit-scrollbar {
            height: 8px;
        }
        .code-container::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 0 0 20px 20px;
        }
        .code-container::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb {
            background: #9ca3af;
        }

        /* Markdown Styles */
        .md-content h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #000; }
        .md-content h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #000; }
        .md-content h3 { font-size: 1.125rem; font-weight: 700; margin-top: 1rem; margin-bottom: 0.5rem; color: #000; }
        .md-content h4, .md-content h5, .md-content h6 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #000; }
        .md-content p { margin-bottom: 0.75rem; }
        .md-content p:last-child { margin-bottom: 0; }
        .md-content ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .md-content ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .md-content li { margin-bottom: 0.25rem; }
        .md-content code:not(.hljs) { 
            background-color: #e5e7eb; 
            color: #db2777; 
            padding: 0.125rem 0.375rem; 
            border-radius: 0.25rem; 
            font-size: 0.875rem; 
            font-family: monospace; 
            word-break: break-word; 
        }
        .md-content pre { margin: 0; }
        .md-content blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; color: #4b5563; font-style: italic; margin-bottom: 1rem; }
        .md-content a { color: #2563eb; text-decoration: underline; }
        .md-content strong { font-weight: 700; }
        .md-content em { font-style: italic; }
        .md-content tbody td:first-child { font-weight: 600; background-color: #f9fafb; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden selection:bg-gray-200">
    
    <header id="app-header" class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md z-30 flex flex-col transition-transform duration-300">
        <div class="w-full px-5 py-3 flex items-center justify-start gap-4">
            <button id="btn-sidebar-open" class="p-2 -ml-2 text-gray-700 hover:text-black transition rounded-full hover:bg-gray-50 flex items-center justify-center">
                <i class="ph ph-list text-2xl"></i>
            </button>
            <h1 class="relative inline-block font-extrabold text-3xl tracking-tight font-montserrat">
                <span class="shiny-text">Clincoo</span>
                <span class="absolute top-1/2 left-0 w-full h-[3px] bg-white -translate-y-1/2 opacity-100 pointer-events-none"></span>
            </h1>
        </div>
    </header>

    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/40 z-40 hidden transition-opacity duration-300 opacity-0"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-50 transform -translate-x-full transition-transform duration-300 flex flex-col border-r border-gray-100 shadow-2xl">
        <div class="px-5 py-3 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-1 -ml-2">
                <div id="logo-3d-container" class="relative w-14 h-14 flex items-center justify-center overflow-hidden bg-transparent"></div>
                <h1 class="relative inline-block font-extrabold text-3xl tracking-tight font-montserrat">
                    <span class="shiny-text">Clincoo</span>
                    <span class="absolute top-1/2 left-0 w-full h-[3px] bg-white -translate-y-1/2 opacity-100 pointer-events-none"></span>
                </h1>
            </div>
            <button id="btn-sidebar-close" class="p-2 -mr-2 text-gray-500 hover:text-black transition rounded-full hover:bg-gray-50 flex items-center justify-center">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>

        <!-- Nav Menu Sidebar -->
        <nav class="px-3 pt-2 pb-3 border-b border-gray-100 flex-shrink-0">
            <ul class="space-y-0.5">
                <li>
                    <button onclick="alert('Proyek - Segera hadir')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-gray-50 transition-colors text-sm font-medium">
                        <i class="ph ph-folder text-xl text-gray-500"></i>
                        <span>Proyek</span>
                    </button>
                </li>
                <li>
                    <button onclick="alert('Gambar - Segera hadir')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-gray-50 transition-colors text-sm font-medium">
                        <i class="ph ph-image text-xl text-gray-500"></i>
                        <span>Gambar</span>
                    </button>
                </li>
                <li>
                    <button onclick="alert('Canvas - Segera hadir')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-gray-50 transition-colors text-sm font-medium">
                        <i class="ph ph-layout text-xl text-gray-500"></i>
                        <span>Canvas</span>
                    </button>
                </li>
                <li>
                    <button onclick="alert('Perpustakaan - Segera hadir')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-gray-50 transition-colors text-sm font-medium">
                        <i class="ph ph-books text-xl text-gray-500"></i>
                        <span>Perpustakaan</span>
                    </button>
                </li>
                <li>
                    <button onclick="alert('Aplikasi - Segera hadir')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-gray-50 transition-colors text-sm font-medium">
                        <i class="ph ph-squares-four text-xl text-gray-500"></i>
                        <span>Aplikasi</span>
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Chat History Section -->
        <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col">
            <div class="flex items-center justify-between px-4 pt-3 pb-1 flex-shrink-0">
                <span class="text-[11px] font-semibold text-gray-400 tracking-widest uppercase">Terkini</span>
                <button class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-50 rounded-lg transition-colors" title="Riwayat">
                    <i class="ph ph-clock-counter-clockwise text-base"></i>
                </button>
            </div>
            <div id="chat-history-list" class="flex-1 p-2 space-y-0.5 custom-scrollbar"></div>
        </div>

        <!-- Tombol Obrolan Baru - sticky di bawah -->
        <div class="p-4 border-t border-gray-50 flex-shrink-0">
            <button id="btn-new-chat" class="w-full flex items-center justify-center gap-2 bg-black text-white py-3 px-5 rounded-full hover:bg-gray-800 transition-all shadow-md font-medium text-sm active:scale-[0.97]">
                <i class="ph-bold ph-pencil-simple text-base"></i>
                Obrolan Baru
            </button>
        </div>
    </div>

    <main id="chat-container" class="flex-1 overflow-y-auto px-4 pt-24 pb-32 space-y-8 w-full">
    </main>

    <footer class="fixed bottom-0 left-0 right-0 w-full bg-transparent px-4 py-4 z-20 pointer-events-none flex flex-col justify-end">
        <div id="upload-popup" class="hidden absolute bottom-full left-4 mb-3 bg-white/95 backdrop-blur-md border border-gray-200 rounded-xl shadow-lg p-1.5 w-36 transition-all origin-bottom-left z-20 pointer-events-auto">
            <button id="btn-upload-img" class="w-full flex items-center gap-2.5 p-2 hover:bg-gray-50 rounded-lg text-sm text-gray-700 font-medium transition-colors">
                <i class="ph ph-image text-lg text-gray-500"></i> Gambar
            </button>
            <button id="btn-upload-doc" class="w-full flex items-center gap-2.5 p-2 hover:bg-gray-50 rounded-lg text-sm text-gray-700 font-medium transition-colors">
                <i class="ph ph-file-text text-lg text-gray-500"></i> Dokumen
            </button>
        </div>

        <div id="attachment-preview" class="hidden absolute bottom-full left-4 mb-3 bg-white/95 backdrop-blur-md border border-gray-200 rounded-xl p-2 shadow-lg flex items-center gap-3 max-w-[250px] z-10 transition-all origin-bottom-left pointer-events-auto">
            <div id="attachment-preview-icon" class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0">
            </div>
            <div class="flex-1 overflow-hidden">
                <p id="attachment-preview-name" class="text-sm font-semibold text-gray-800 truncate"></p>
                <p id="attachment-preview-size" class="text-[11px] text-gray-500"></p>
            </div>
            <button id="btn-remove-attachment" class="p-1.5 text-gray-400 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50">
                <i class="ph ph-x"></i>
            </button>
        </div>

        <input type="file" id="image-upload" accept="image/*" class="hidden">
        <input type="file" id="doc-upload" accept=".txt,.pdf,.md,.csv,.json,.js,.html,.css" class="hidden">

        <div id="input-wrapper" class="relative flex items-end bg-white rounded-2xl rounded-br-[24px] p-1.5 transition-all shadow-[0_5px_20px_-5px_rgba(0,0,0,0.15)] focus-within:shadow-[0_8px_30px_-5px_rgba(0,0,0,0.2)] pointer-events-auto duration-200">
            <button id="btn-plus" class="text-gray-500 hover:text-black transition-transform duration-300 ease-in-out flex-shrink-0 rounded-full h-9 w-9 flex items-center justify-center">
                <i class="ph ph-plus text-xl"></i>
            </button>

            <textarea id="chat-input" rows="1" class="flex-1 min-w-0 bg-transparent text-black placeholder-gray-400 outline-none px-2 py-1.5 text-sm sm:text-base resize-none overflow-hidden custom-scrollbar transition-all duration-150" style="height: 38px; line-height: 24px;" placeholder="Ketik pesan..." autocomplete="off"></textarea>

            <button id="btn-action" class="w-9 h-9 flex items-center justify-center bg-black text-white rounded-full flex-shrink-0 hover:bg-gray-800 transition-colors shadow-md ml-1">
                <i id="action-icon" class="ph-bold ph-arrow-up text-lg transition-all"></i>
            </button>
        </div>        
    </footer>

    <script>
        // Polyfill untuk menghindari error E2B Code Interpreter saat diload di Browser
        if (typeof window !== 'undefined') {
            window.process = window.process || { env: {} };
        }

        const logoContainer = document.getElementById('logo-3d-container');
        const logoScene = new THREE.Scene();
        
        const logoCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        logoCamera.position.z = 3.2;

        const logoRenderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true,
            preserveDrawingBuffer: true 
        });
        logoRenderer.setSize(56, 56);
        logoRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        logoContainer.appendChild(logoRenderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        logoScene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x6366f1, 1.8, 10);
        pointLight1.position.set(2, 2, 2);
        logoScene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xec4899, 1.8, 10);
        pointLight2.position.set(-2, -2, 2);
        logoScene.add(pointLight2);

        const coreGeo = new THREE.OctahedronGeometry(0.72, 0);
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0x6366f1,
            metalness: 0.9,
            roughness: 0.15,
            flatShading: true
        });
        const coreMesh = new THREE.Mesh(coreGeo, coreMat);
        logoScene.add(coreMesh); 

        const ringGeo = new THREE.TorusGeometry(0.98, 0.07, 8, 48);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xec4899,
            metalness: 0.8,
            roughness: 0.2
        });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.rotation.y = Math.PI / 6; 
        ringMesh.rotation.z = Math.PI / 8;
        logoScene.add(ringMesh);

        let lastFaviconUpdate = 0;

        function animateLogo() {
            requestAnimationFrame(animateLogo);
            ringMesh.rotation.x -= 0.035; 
            logoRenderer.render(logoScene, logoCamera);

            const now = Date.now();
            if (now - lastFaviconUpdate > 150) {
                const faviconLink = document.getElementById('dynamic-favicon');
                if (faviconLink) {
                    faviconLink.href = logoRenderer.domElement.toDataURL('image/png');
                }
                lastFaviconUpdate = now;
            }
        }

        window.addEventListener('load', () => {
            animateLogo();
        });

        const chatContainer = document.getElementById('chat-container');
        const inputWrapper = document.getElementById('input-wrapper');
        const chatInput = document.getElementById('chat-input');
        const btnAction = document.getElementById('btn-action');
        const actionIcon = document.getElementById('action-icon');
        const btnPlus = document.getElementById('btn-plus');
        const uploadPopup = document.getElementById('upload-popup');
        const btnUploadImg = document.getElementById('btn-upload-img');
        const btnUploadDoc = document.getElementById('btn-upload-doc');
        const imgUpload = document.getElementById('image-upload');
        const docUpload = document.getElementById('doc-upload');
        const attachmentPreview = document.getElementById('attachment-preview');
        const attachmentPreviewIcon = document.getElementById('attachment-preview-icon');
        const attachmentPreviewName = document.getElementById('attachment-preview-name');
        const attachmentPreviewSize = document.getElementById('attachment-preview-size');
        const btnRemoveAttachment = document.getElementById('btn-remove-attachment');
        
        let currentAttachment = null;
        
        const appHeader = document.getElementById('app-header');
        const headerLine = document.getElementById('header-line');
        const btnSidebarOpen = document.getElementById('btn-sidebar-open');
        const btnSidebarClose = document.getElementById('btn-sidebar-close');
        const sidebar = document.getElementById('sidebar');
        const sidebarBackdrop = document.getElementById('sidebar-backdrop');
        const btnNewChat = document.getElementById('btn-new-chat');

        let isGenerating = false;
        let typingInterval = null;
        let currentAiMessageId = null;
        let currentStatusInterval = null;
        let abortController = null;
        let autoScrollActive = true;
        let isUserInteracting = false;
        let lastScrollTop = 0;
        let imageGenerationTimeout = null;
        
        const STORAGE_KEY = 'clincoo_chats_v1';
        let chatSessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentSessionId = null;
        let messages = [];

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatSessions));
            renderChatHistory();
        }

        function createNewSession() {
            currentSessionId = generateId();
            messages = [
                { id: generateId(), role: 'ai', text: 'Halo! 🌟 Saya Clincoo, **Superagent AI** pribadi Anda. Saya dirancang untuk menjadi asisten yang cerdas, ramah, dan selalu siap membantu Anda—mulai dari memecahkan masalah rumit, menulis kode pemrograman kompleks, mencari data *real-time*, hingga menghasilkan visual. Ada ide atau pertanyaan apa yang bisa kita bahas bersama hari ini?', isProcessing: false, isTyping: false }
            ];
            chatSessions.unshift({
                id: currentSessionId,
                title: 'Percakapan Baru',
                updatedAt: Date.now(),
                messages: messages
            });
            saveToLocalStorage();
            renderMessages();
        }

        function updateCurrentSession() {
            if (!currentSessionId) return;
            const sessionIndex = chatSessions.findIndex(s => s.id === currentSessionId);
            if (sessionIndex !== -1) {
                // Auto-generate title dari pesan pertama user
                if (chatSessions[sessionIndex].title === 'Percakapan Baru') {
                    const firstUserMsg = messages.find(m => m.role === 'user');
                    if (firstUserMsg && firstUserMsg.text) {
                        chatSessions[sessionIndex].title = firstUserMsg.text.substring(0, 25) + (firstUserMsg.text.length > 25 ? '...' : '');
                    } else if (firstUserMsg && firstUserMsg.attachment) {
                         chatSessions[sessionIndex].title = 'Analisis Dokumen/Gambar';
                    }
                }
                
                // Bersihkan flag state sementara sebelum disimpan
                const cleanMessages = messages.map(m => ({
                    ...m,
                    isProcessing: false,
                    isTyping: false
                }));

                chatSessions[sessionIndex].messages = cleanMessages;
                chatSessions[sessionIndex].updatedAt = Date.now();
                
                // Urutkan berdasarkan yang paling baru diupdate
                chatSessions.sort((a, b) => b.updatedAt - a.updatedAt);
                saveToLocalStorage();
            }
        }

        window.loadSession = function(sessionId) {
            if (isGenerating) stopGeneration();
            const session = chatSessions.find(s => s.id === sessionId);
            if (session) {
                currentSessionId = session.id;
                // Deep copy agar tidak mengubah referensi aslinya secara langsung
                messages = JSON.parse(JSON.stringify(session.messages)); 
                renderMessages();
                closeSidebar();
                renderChatHistory(); // Update visual state aktif
            }
        }

        window.deleteSession = function(e, sessionId) {
            e.stopPropagation(); 
            chatSessions = chatSessions.filter(s => s.id !== sessionId);
            if (currentSessionId === sessionId) {
                if (chatSessions.length > 0) {
                    window.loadSession(chatSessions[0].id);
                } else {
                    createNewSession();
                }
            } else {
                saveToLocalStorage();
            }
        }

        function renderChatHistory() {
            const container = document.getElementById('chat-history-list');
            if (!container) return;
            container.innerHTML = '';
            
            if (chatSessions.length === 0) {
                container.innerHTML = '<p class="text-[13px] text-gray-400 text-center mt-4">Belum ada riwayat</p>';
                return;
            }

            chatSessions.forEach(session => {
                const isActive = session.id === currentSessionId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2.5 mb-1 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-gray-100' : 'hover:bg-gray-50'}`;
                div.onclick = () => window.loadSession(session.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-2.5 overflow-hidden flex-1 pl-1">
                        <i class="ph ph-chat-teardrop-text ${isActive ? 'text-black' : 'text-gray-500'} text-lg flex-shrink-0"></i>
                        <span class="text-[13px] ${isActive ? 'font-semibold text-black' : 'font-medium text-gray-700'} truncate">${session.title || 'Percakapan Baru'}</span>
                    </div>
                    <button onclick="deleteSession(event, '${session.id}')" class="opacity-0 group-hover:opacity-100 p-1.5 text-gray-400 hover:text-red-500 transition-all rounded-lg hover:bg-red-50 flex-shrink-0" title="Hapus">
                        <i class="ph ph-trash"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        // Initialize Data saat load pertama kali
        if (chatSessions.length > 0) {
            window.loadSession(chatSessions[0].id);
        } else {
            createNewSession();
        }

        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        function adjustInputHeight() {
            chatInput.style.height = '38px';
            if (chatInput.value.trim() === '') {
                chatInput.classList.replace('overflow-y-auto', 'overflow-hidden');
                return;
            }
            let scrollHeight = chatInput.scrollHeight;
            if (scrollHeight > 45) { 
                const newHeight = Math.min(scrollHeight, 140);
                chatInput.style.height = newHeight + 'px';
                if (scrollHeight > 140) {
                    chatInput.classList.replace('overflow-hidden', 'overflow-y-auto');
                } else {
                    chatInput.classList.replace('overflow-y-auto', 'overflow-hidden');
                }
            } else {
                chatInput.style.height = '38px';
                chatInput.classList.replace('overflow-y-auto', 'overflow-hidden');
            }
        }

        chatInput.addEventListener('input', adjustInputHeight);

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function balanceMarkdown(text) {
            if (!text) return text;
            let result = text;
            const codeBlocks = (result.match(/```/g) || []).length;
            if (codeBlocks % 2 !== 0) result += '\n```';
            let bCount = (result.match(/\*\*/g) || []).length;
            if (bCount % 2 !== 0) result += '**';
            let temp = result.replace(/\*\*/g, '');
            let iCount = (temp.match(/\*/g) || []).length;
            if (iCount % 2 !== 0) result += '*';
            let uCount = (result.match(/__/g) || []).length;
            if (uCount % 2 !== 0) result += '__';
            let temp2 = result.replace(/__/g, '');
            let uSingleCount = (temp2.match(/_/g) || []).length;
            if (uSingleCount % 2 !== 0) result += '_';
            let temp4 = result.replace(/```[\s\S]*?```/g, '');
            let backtickCount = (temp4.match(/`/g) || []).length;
            if (backtickCount % 2 !== 0) result += '`';
            return result;
        }

        function showGlobalTooltip(element, text) {

            const rect = element.getBoundingClientRect();

            tooltip.className = 'global-tooltip fixed bg-black text-white text-[11px] font-semibold px-2.5 py-1.5 rounded shadow-lg whitespace-nowrap pointer-events-none z-[9999] fade-in';

            tooltip.style.left = `${rect.left + (rect.width / 2) - (tooltipRect.width / 2)}px`;
            tooltip.style.top = `${rect.top - tooltipRect.height - 8}px`;

        function downloadCode(btnElement, lang) {
            const encodedCode = btnElement.getAttribute('data-code');
            const code = decodeURIComponent(encodedCode);
            const extMap = {
                'python': 'py', 'javascript': 'js', 'html': 'html', 'css': 'css', 
                'java': 'java', 'cpp': 'cpp', 'c': 'c', 'php': 'php', 'ruby': 'rb',
                'json': 'json', 'typescript': 'ts', 'bash': 'sh', 'shell': 'sh',
                'go': 'go', 'rust': 'rs', 'csv': 'csv', 'sql': 'sql', 'xml': 'xml'
            };
            const ext = extMap[lang.toLowerCase()] || 'txt';
            const filename = `generated_file.${ext}`;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        async function runCode(btnElement, lang, blockId) {
            const encodedCode = btnElement.getAttribute('data-code');
            const code = decodeURIComponent(encodedCode);
            const outputContainer = document.getElementById(`${blockId}-output-container`);
            const outputEl = document.getElementById(`${blockId}-output`);
            const iframeEl = document.getElementById(`${blockId}-iframe`);
            
            outputContainer.classList.remove('hidden');
            outputEl.classList.remove('hidden');
            if(iframeEl) iframeEl.classList.add('hidden');

            outputEl.innerHTML = '<span class="text-blue-400 animate-pulse">Memulai koneksi ke E2B Sandbox...</span>';
            const targetLang = lang.toLowerCase();

            try {
                const e2bModule = await import('https://esm.sh/@e2b/code-interpreter?bundle&target=es2022');
                const CodeInterpreter = e2bModule.CodeInterpreter;
                
                outputEl.innerHTML = '<span class="text-blue-400 animate-pulse">Menyiapkan E2B Sandbox (e2b.dev)...</span>';
                const e2bKeyRes = await fetch('/api/config');
                const e2bConfig = e2bKeyRes.ok ? await e2bKeyRes.json() : {};
                const e2bApiKey = e2bConfig.e2bKey || '';
                const sandbox = await CodeInterpreter.create({ apiKey: e2bApiKey });
                
                outputEl.innerHTML = '<span class="text-blue-400 animate-pulse">Mengeksekusi kode dalam Sandbox...</span>';

                let outputText = "";
                let errorText = "";

                if (targetLang === 'python') {
                    const exec = await sandbox.notebook.execCell(code);
                    if (exec.text) outputText += exec.text + "\n";
                    if (exec.results) {
                        for (const res of exec.results) {
                            if (res.text) outputText += res.text + "\n";
                            if (res.error) errorText += res.error.value + "\n";
                        }
                    }
                    if (exec.logs) {
                        if (exec.logs.stdout) outputText += exec.logs.stdout.join('\n');
                        if (exec.logs.stderr) errorText += exec.logs.stderr.join('\n');
                    }
                    if (exec.error) {
                        errorText += `${exec.error.name}: ${exec.error.value}\n${exec.error.traceback}`;
                    }
                } else {
                    const e2bLangMap = {
                        'javascript': { filename: 'main.js', runCmd: 'node main.js' },
                        'js': { filename: 'main.js', runCmd: 'node main.js' },
                        'java': { filename: 'Main.java', runCmd: 'javac Main.java && java Main' },
                        'c': { filename: 'main.c', runCmd: 'gcc main.c -o main && ./main' },
                        'cpp': { filename: 'main.cpp', runCmd: 'g++ main.cpp -o main && ./main' },
                        'php': { filename: 'main.php', runCmd: 'php main.php' },
                        'ruby': { filename: 'main.rb', runCmd: 'ruby main.rb' },
                        'go': { filename: 'main.go', runCmd: 'go run main.go' },
                        'rust': { filename: 'main.rs', runCmd: 'rustc main.rs && ./main' }
                    };
                    
                    const runInfo = e2bLangMap[targetLang] || { filename: 'main.txt', runCmd: 'cat main.txt' };
                    
                    await sandbox.filesystem.write(runInfo.filename, code);
                    const cmdExe = await sandbox.commands.run(runInfo.runCmd);
                    
                    outputText = cmdExe.stdout;
                    errorText = cmdExe.stderr || (cmdExe.error ? cmdExe.error.message : "");
                }

                await sandbox.close();

                if (errorText) {
                    outputEl.innerHTML = `<span class="text-red-400">${errorText.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>`;
                } else {
                    outputEl.innerHTML = `<span class="text-green-400">${(outputText || '').replace(/</g, "&lt;").replace(/>/g, "&gt;") || '(Tidak ada output/berhasil dieksekusi)'}</span>`;
                }

            } catch (e2bError) {
                console.warn("E2B execution failed, falling back to Piston Sandbox.", e2bError);
                outputEl.innerHTML = '<span class="text-yellow-400 animate-pulse">E2B Gagal/Timeout. Melanjutkan ke Piston Sandbox (Fallback)...</span>';
                
                const langMapPiston = {
                    'python': { language: 'python', version: '*' },
                    'javascript': { language: 'javascript', version: '*' },
                    'js': { language: 'javascript', version: '*' },
                    'java': { language: 'java', version: '*' },
                    'c': { language: 'c', version: '*' },
                    'cpp': { language: 'c++', version: '*' },
                    'php': { language: 'php', version: '*' },
                    'ruby': { language: 'ruby', version: '*' },
                    'go': { language: 'go', version: '*' },
                    'rust': { language: 'rust', version: '*' }
                };
                
                const runInfoPiston = langMapPiston[targetLang] || { language: targetLang, version: '*' };

                try {
                    const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            language: runInfoPiston.language,
                            version: runInfoPiston.version,
                            files: [{ content: code }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.compile && data.compile.code !== 0) {
                        outputEl.innerHTML = `<span class="text-red-400">${data.compile.stderr.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>`;
                    } else if (data.run) {
                        let out = data.run.output.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        if (data.run.code !== 0) {
                             outputEl.innerHTML = `<span class="text-red-400">${out || 'Terjadi kesalahan eksekusi.'}</span>`;
                        } else {
                             outputEl.innerHTML = `<span class="text-green-400">${out || '(Tidak ada output/berhasil dieksekusi)'}</span>`;
                        }
                    } else {
                         outputEl.innerHTML = `<span class="text-red-400">Gagal menjalankan kode atau bahasa belum didukung server (versi).</span>`;
                    }
                } catch (err) {
                    outputEl.innerHTML = `<span class="text-red-400">Terjadi kesalahan jaringan pada sistem eksekusi Piston.</span>`;
                }
            }
        }

        function readAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function readAsText(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsText(file);
            });
        }

        async function loadPDF(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let maxPages = pdf.numPages;
                let text = "";
                for (let i = 1; i <= Math.min(maxPages, 10); i++) { 
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(' ') + "\n";
                }
                return text;
            } catch(err) {
                return "Gagal membaca file PDF.";
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        async function handleFileUpload(e, type) {
            const file = e.target.files[0];

            let data = null;
            let text = null;

            } else {
                if (file.type === 'application/pdf') {
                    text = await loadPDF(file);
                } else {
                    text = await readAsText(file);
                }
            }

            currentAttachment = {
                file: file,
                type: type,
                name: file.name,
                size: formatSize(file.size),
                data: data,
                text: text
            };

            showAttachmentPreview();
            e.target.value = '';
        }

        async function downloadImage(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) {
                window.open(url, '_blank');
            }
        }

                    for (const modelName of modelPool) {
                        if (abortController.signal.aborted) break;

                        const fetchTimeout = new AbortController();
                        const timeoutId = setTimeout(() => fetchTimeout.abort(), 6500); // Batas 6.5 detik tiap model
                        const onUserAbort = () => fetchTimeout.abort();
                        abortController.signal.addEventListener('abort', onUserAbort);

                        try {
                            const res = await fetch(url, {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${apiKey}`,
                                    'HTTP-Referer': 'https://clincoo.ai',
                                    'X-Title': 'Clincoo'
                                },
                                body: JSON.stringify({ 
                                    model: modelName,
                                    messages: apiHistory,
                                    stream: true
                                }),
                                signal: fetchTimeout.signal
                            });
                            
                            clearTimeout(timeoutId);
                            abortController.signal.removeEventListener('abort', onUserAbort);

                            if (res.ok) {
                                response = res;
                                break; 
                            }
                        } catch (e) {
                            clearTimeout(timeoutId);
                            abortController.signal.removeEventListener('abort', onUserAbort);
                            if (abortController.signal.aborted) break;
                            console.warn(`Model ${modelName} gagal/timeout, beralih ke cadangan...`);
                            continue;
                        }
                    }

                    // Jika OpenRouter sibuk atau gagal merespons, beralih ke Google AI Studio (Gemini)
                    if (!response) {
                        useGemini = true;
                    }
                }

                if (useGemini) {
                    try {
                        // Gemini key diambil dari backend
                        const gmCfgRes = await fetch('/api/config');
                        const gmCfgData = gmCfgRes.ok ? await gmCfgRes.json() : {};
                        const geminiApiKey = gmCfgData.geminiKey || '';
                        let geminiContents = [];
                        
                        validMessages.slice(-15).forEach(m => {
                            let parts = [];
                            if (m.role === 'ai') {
                                if (!m.isImageResponse) {
                                    parts.push({ text: m.text });
                                }
                            } else {
                                let contentText = m.text || "";
                                if (m.attachment) {
                                    if (m.attachment.type === 'document') {
                                        const docText = m.attachment.text ? m.attachment.text.substring(0, 15000) : "Teks dokumen tidak dapat dibaca.";
                                        contentText = `[Konteks Dokumen: ${m.attachment.name}]\n${docText}\n\n[Pesan User]: ${contentText || "Tolong analisis dokumen ini."}`;
                                        parts.push({ text: contentText });
                                    } else if (m.attachment.type === 'image') {
                                        if (contentText) {
                                            parts.push({ text: contentText });
                                        } else {
                                            parts.push({ text: "Tolong analisis gambar ini dan berikan wawasan secara mendetail." });
                                        }
                                        const match = m.attachment.data.match(/^data:(image\/[a-zA-Z+]+);base64,(.+)$/);
                                        if (match) {
                                            parts.push({
                                                inline_data: {
                                                    mime_type: match[1],
                                                    data: match[2]
                                                }
                                            });
                                        }
                                    }
                                } else {
                                    parts.push({ text: contentText || "Pesan." });
                                }
                            }
                            
                            if (parts.length > 0) {
                                geminiContents.push({
                                    role: m.role === 'ai' ? 'model' : 'user',
                                    parts: parts
                                });
                            }
                        });

                        // Standarisasi riwayat percakapan khusus untuk Gemini API (Google AI Studio)
                        while (geminiContents.length > 0 && geminiContents[0].role !== 'user') {
                            geminiContents.shift();
                        }
                        
                        const normalizedContents = [];
                        for (const msg of geminiContents) {
                            if (normalizedContents.length === 0) {
                                normalizedContents.push(msg);
                            } else {
                                const lastMsg = normalizedContents[normalizedContents.length - 1];
                                if (lastMsg.role === msg.role) {
                                    lastMsg.parts = lastMsg.parts.concat(msg.parts);
                                } else {
                                    normalizedContents.push(msg);
                                }
                            }
                        }

                        const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key=${geminiApiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: normalizedContents,
                                systemInstruction: {
                                    parts: [{ text: systemInstructions }]
                                }
                            }),
                            signal: abortController.signal
                        });

                        if (geminiRes.ok) {
                            response = geminiRes;
                        } else {
                            console.warn("AI Studio menolak permintaan. Kembali mencoba Fallback akhir.");
                        }
                    } catch (e) {
                        console.warn("Kesalahan koneksi saat menghubungi AI Studio:", e);
                    }
                }

                if (!response) {
                    try {
                        const cleanHistory = apiHistory.map(msg => {
                            if (Array.isArray(msg.content)) {
                                const textPart = msg.content.find(c => c.type === 'text');
                                return { ...msg, content: textPart ? textPart.text : "[Gambar Terlampir]" };
                            }
                            return msg;
                        });

                        const pollRes = await fetch("https://text.pollinations.ai/", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                messages: cleanHistory,
                                model: 'openai',
                                system: systemInstructions
                            }),
                            signal: abortController.signal
                        });

                        if (pollRes.ok) {
                            const responseText = await pollRes.text();
                            hasReceivedData = true;
                            clearTimeout(apiTimeout);
                            clearInterval(statusInterval);
                            const msgIndex = messages.findIndex(m => m.id === aiMsgObj.id);
                            if (msgIndex !== -1 && messages[msgIndex].isProcessing) {
                                messages[msgIndex].isProcessing = false;
                                messages[msgIndex].isTyping = true;
                            }
                            streamingBuffer = responseText;
                            isFetchComplete = true;
                        } else {
                            throw new Error("Pollinations API Error");
                        }
                    } catch (err) {
                        clearTimeout(apiTimeout);
                        clearInterval(statusInterval);
                        const index = messages.findIndex(m => m.id === aiMsgObj.id);
                        if (index !== -1) {
                            messages[index].text = `Semua layanan AI sedang sibuk. <span onclick="retryGeneration('${aiMsgObj.id}')" class="cursor-pointer underline font-medium" style="text-underline-offset: 3px; pointer-events-auto;">coba lagi</span>`;
                            messages[index].isError = true;
                        }
                        stopGeneration();
                    }
                } else {
                    try {
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder('utf-8');
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            hasReceivedData = true;
                            clearTimeout(apiTimeout);

                            const msgIndex = messages.findIndex(m => m.id === aiMsgObj.id);
                            if (msgIndex !== -1 && messages[msgIndex].isProcessing) {
                                messages[msgIndex].isProcessing = false;
                                messages[msgIndex].isTyping = true;
                                clearInterval(statusInterval);
                            }

                            const chunk = decoder.decode(value, { stream: true });
                            const lines = chunk.split('\n');
                            for (const line of lines) {
                                if (line.trim().startsWith('data: ') && line.trim() !== 'data: [DONE]') {
                                    try {
                                        const data = JSON.parse(line.replace(/^data: /, ''));
                                        
                                        // Parsing data streaming dari OpenRouter
                                        if (data.choices && data.choices[0].delta && data.choices[0].delta.content) {
                                            streamingBuffer += data.choices[0].delta.content;
                                        }
                                        // Parsing data streaming dari Google AI Studio (Gemini)
                                        else if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text) {
                                            streamingBuffer += data.candidates[0].content.parts[0].text;
                                        }
                                    } catch (e) {}
                                }
                            }
                        }
                        isFetchComplete = true;
                    } catch (e) {
                        if (e.name !== 'AbortError') isFetchComplete = true;
                    }
                }
            }

            if (!isGenerating || !currentAiMessageId) return;
            if (typingInterval) clearInterval(typingInterval);

            let localText = "";
            typingInterval = setInterval(() => {
                if (charIndex < streamingBuffer.length) {
                    const diff = streamingBuffer.length - charIndex;
                    let charsToProcess = 1; 
                    if (diff > 15) charsToProcess = Math.ceil(diff / 4); 
                    
                    localText += streamingBuffer.substring(charIndex, charIndex + charsToProcess);
                    charIndex += charsToProcess;
                    
                    const msgIndex = messages.findIndex(m => m.id === aiMsgObj.id);
                    if (msgIndex !== -1) {
                        messages[msgIndex].text = localText;
                        const textEl = document.getElementById(`msg-text-${aiMsgObj.id}`);
                        if (textEl) {
                            textEl.innerHTML = formatMarkdown(balanceMarkdown(messages[msgIndex].text));
                            textEl.classList.add('typing-cursor');
                        }
                    }
                    scrollToBottom(false);
                } else if (isFetchComplete && charIndex >= streamingBuffer.length) {
                    stopGeneration();
                }
            }, 10); 
        }

        btnAction.addEventListener('click', () => {
            if (isGenerating) {
                stopGeneration();
            } else {
                const text = chatInput.value.trim();
                if (text || currentAttachment) {
                    messages.push({
                        id: generateId(),
                        role: 'user',
                        text: text,
                        attachment: currentAttachment
                    });
                    
                    chatInput.value = '';
                    adjustInputHeight();
                    currentAttachment = null;
                    attachmentPreview.classList.add('hidden');
                    autoScrollActive = true;
                    renderMessages();
                    
                    updateCurrentSession(); // Simpan data user ke riwayat sebelum fetch
                    fetchAIResponse();
                }
            }
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isGenerating) btnAction.click();
            }
        });

        renderMessages();
    </script>
</body>
</html>
