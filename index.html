        Google:<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" className={className}><path fill="#EA4335" d="M12 4.782c2.09 0 3.967.72 5.44 2.112l4.072-4.072C19.043 1.05 15.776 0 12 0 7.37 0 3.35 2.59 1.258 6.405l4.78 3.71C7.218 7.027 9.4 4.782 12 4.782z"/><path fill="#4285F4" d="M23.49 12.275c0-.85-.075-1.667-.217-2.463H12v4.66h6.446c-.277 1.51-1.125 2.79-2.38 3.633l3.834 2.973c2.24-2.065 3.59-5.11 3.59-8.803z"/><path fill="#FBBC05" d="M6.038 10.115c-.244.726-.383 1.505-.383 2.31s.14 1.584.383 2.31l-4.78 3.71C.486 16.924 0 14.53 0 12c0-2.53.486-4.924 1.258-6.435l4.78 3.715z"/><path fill="#34A853" d="M12 24c3.776 0 6.942-1.25 9.255-3.385l-3.834-2.973c-1.252.84-2.856 1.34-5.42 1.34-2.6 0-4.782-2.245-5.96-5.333l-4.78 3.71C3.35 21.41 7.37 24 12 24z"/></svg>,

        Share2:<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>,
        VolumeX:<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>,

        RefreshCw:<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
        Shorts:<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M10 14.65v-5.3L15 12l-5 2.65zm7.77-4.27l-1.2-.5.5-1.2c.67-1.63-.12-3.5-1.75-4.17s-3.5.12-4.17 1.75L9.62 9.87l1.2.5-.5 1.2c-.67 1.63.12 3.5 1.75 4.17s3.5-.12 4.17-1.75l1.53-3.61zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>,

      return icons[name] || null;

    /* ══════════════════ UPLOAD MODAL ══════════════════ */
    const UploadModal = ({onClose, user, clincoUser, onUploaded}) => {
      const [step, setStep] = useState('source'); // source | camera | form | uploading | done | error
      const [videoFile, setVideoFile] = useState(null);
      const [previewUrl, setPreviewUrl] = useState('');
      const [title, setTitle] = useState('');
      const [description, setDescription] = useState('');
      const [tags, setTags] = useState('');
      const [progress, setProgress] = useState(0);
      const [errorMsg, setErrorMsg] = useState('');
      const fileRef = useRef(null);
      const cameraRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const chunksRef = useRef([]);
      const [recording, setRecording] = useState(false);
      const [cameraStream, setCameraStream] = useState(null);
      const [recordedBlob, setRecordedBlob] = useState(null);
      const [recDuration, setRecDuration] = useState(0);
      const recTimerRef = useRef(null);

      // Cleanup stream on unmount
      useEffect(() => {
        return () => {
          if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
          if (recTimerRef.current) clearInterval(recTimerRef.current);
        };
      }, [cameraStream]);

      const openGallery = () => fileRef.current?.click();

      const openCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} },
            audio: true
          });
          setCameraStream(stream);
          setStep('camera');
          setTimeout(() => { if (cameraRef.current) { cameraRef.current.srcObject = stream; cameraRef.current.play(); } }, 100);
        } catch(e) {
          setErrorMsg('Tidak bisa akses kamera: ' + e.message);
          setStep('form');
        }
      };

      const startRecording = () => {
        if (!cameraStream) return;
        chunksRef.current = [];
        const mr = new MediaRecorder(cameraStream, {mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm'});
        mr.ondataavailable = e => { if(e.data.size>0) chunksRef.current.push(e.data); };
        mr.onstop = () => {
          const blob = new Blob(chunksRef.current, {type:'video/webm'});
          const url = URL.createObjectURL(blob);
          setRecordedBlob(blob);
          setVideoFile(new File([blob], 'rekaman.webm', {type:'video/webm'}));
          setPreviewUrl(url);
          cameraStream.getTracks().forEach(t=>t.stop());
          setCameraStream(null);
          setStep('form');
        };
        mediaRecorderRef.current = mr;
        mr.start();
        setRecording(true);
        setRecDuration(0);
        recTimerRef.current = setInterval(() => setRecDuration(d => d+1), 1000);
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && recording) {
          mediaRecorderRef.current.stop();
          setRecording(false);
          clearInterval(recTimerRef.current);
        }
      };

      const handleFile = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        if (!f.type.startsWith('video/')) { setErrorMsg('Hanya file video yang didukung.'); return; }
        if (f.size > 500*1024*1024) { setErrorMsg('Ukuran maksimal 500MB.'); return; }
        setErrorMsg(''); setVideoFile(f); setPreviewUrl(URL.createObjectURL(f));
        setStep('form');
      };

      const handleUpload = async () => {
        if (!videoFile) { setErrorMsg('Pilih atau rekam video dulu.'); return; }
        if (!title.trim()) { setErrorMsg('Judul wajib diisi.'); return; }
        setStep('uploading'); setProgress(15);
        try {
          const timer = setInterval(() => setProgress(p => Math.min(p+7, 85)), 500);
          // Simpan sebagai object URL (works for same-session playback)
          // Untuk produksi: ganti dengan endpoint CDN/Cloudinary/S3 kamu sendiri
          const video_url = previewUrl;
          clearInterval(timer); setProgress(90);
          const tagList = tags.split(',').map(t=>t.trim()).filter(Boolean);
          const uid = clincoUser?.id || user?.uid || user?.email || 'anon';
          const res = await api.post('videoUpload',{
            user_id: uid,
            title: title.trim(),
            description: description.trim(),
            video_url,
            thumbnail_url: '',
            duration: 0,
            tags: tagList
          });
          setProgress(100);
          if (res.success) { setStep('done'); setTimeout(()=>{onClose();onUploaded();},1500); }
          else throw new Error(res.error||'Gagal menyimpan ke server');
        } catch(err) { setErrorMsg(err.message); setStep('error'); }
      };

      const fmtDur = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

      return (
        <div className="fixed inset-0 z-[200] flex flex-col justify-end">
          <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={step==='camera'?undefined:onClose}></div>
          <div className="w-full max-w-md mx-auto bg-zinc-900 rounded-t-3xl z-10 animate-slide-up border-t border-zinc-800" style={{maxHeight:'92dvh',overflowY:'auto'}}>
            <div className="sticky top-0 bg-zinc-900 px-6 pt-5 pb-3 flex items-center justify-between border-b border-zinc-800 rounded-t-3xl z-10">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center">
                  <Icon name="Film" className="w-4 h-4 text-white"/>
                </div>
                <h2 className="text-lg font-bold text-white">
                  {step==='source'?'Buat Konten':step==='camera'?'Rekam Video':step==='form'?'Detail Video':step==='uploading'?'Mengupload...':step==='done'?'Selesai!':'Upload Gagal'}
                </h2>
              </div>
              {step!=='camera' && <button onClick={onClose} className="p-2 rounded-full hover:bg-zinc-800 text-gray-400"><Icon name="X" className="w-5 h-5"/></button>}
            </div>

            <div className="px-6 py-5">
              {/* ── PILIH SUMBER ── */}
              {step==='source' && (
                <div className="flex flex-col gap-4 py-2">
                  <p className="text-gray-400 text-sm text-center mb-2">Mau buat konten dari mana?</p>
                  <button onClick={openCamera}
                    className="w-full flex items-center gap-4 bg-zinc-800 hover:bg-zinc-700 active:scale-[0.98] transition-all rounded-2xl p-5 border border-zinc-700">
                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center shadow-[0_0_15px_rgba(60,42,255,0.4)] flex-shrink-0">
                      <svg className="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                      </svg>
                    </div>
                    <div className="text-left">
                      <p className="font-bold text-white text-base">Rekam dari Kamera</p>
                      <p className="text-gray-400 text-sm mt-0.5">Buka kamera dan rekam langsung</p>
                    </div>
                  </button>
                  <button onClick={openGallery}
                    className="w-full flex items-center gap-4 bg-zinc-800 hover:bg-zinc-700 active:scale-[0.98] transition-all rounded-2xl p-5 border border-zinc-700">
                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-zinc-600 to-zinc-700 flex items-center justify-center flex-shrink-0">
                      <svg className="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                      </svg>
                    </div>
                    <div className="text-left">

        /* ══════════════════ COMMENT SHEET ══════════════════ */
    const CommentSheet = ({video, onClose, user, clincoUser}) => {
      const [comments, setComments] = useState([]);
      const [text, setText] = useState('');
      const [loading, setLoading] = useState(true);
      const [sending, setSending] = useState(false);
      useEffect(()=>{ api.get(`videoComment?video_id=${video.id}`).then(d=>{setComments(d.comments||[]);setLoading(false);}); },[video.id]);
      const send = async () => {
        if(!text.trim()||!user) return;
        setSending(true);
        const uid = clincoUser?.id||user.uid||user.email;
        const res = await api.post('videoComment',{user_id:uid,video_id:video.id,text:text.trim()});
        if(res.success){setComments(p=>[res.comment,...p]);setText('');}
        setSending(false);
      };
      return (
        <div className="fixed inset-0 z-[150] flex flex-col justify-end">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose}></div>
          <div className="w-full max-w-md mx-auto bg-zinc-900 rounded-t-3xl z-10 animate-slide-up border-t border-zinc-800 flex flex-col" style={{maxHeight:'75dvh'}}>
            <div className="px-5 pt-4 pb-3 flex items-center justify-between border-b border-zinc-800 flex-shrink-0">
              <h3 className="font-bold text-white">Komentar ({fmt(video.comments_count||comments.length)})</h3>
              <button onClick={onClose} className="p-1.5 rounded-full hover:bg-zinc-800 text-gray-400"><Icon name="X" className="w-5 h-5"/></button>
            </div>
            <div className="flex-1 overflow-y-auto custom-scrollbar px-5 py-3">
              {loading
                ? <div className="flex justify-center py-8"><div className="w-6 h-6 border-2 border-[#3c2aff] border-t-transparent rounded-full spinner"></div></div>
                : comments.length===0
                  ? <div className="flex flex-col items-center py-10 text-gray-500"><Icon name="MessageCircle" className="w-10 h-10 mb-2 opacity-30"/><p className="text-sm">Belum ada komentar</p></div>
                  : comments.map((c,i)=>(
                    <div key={c.id||i} className="flex gap-3 mb-4">
                      <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center text-xs font-bold text-white flex-shrink-0">
                        {(c.user_id||'U').charAt(0).toUpperCase()}
                      </div>
                      <div className="flex-1">
                        <p className="text-xs text-gray-400 mb-0.5">{c.user_id?.substring(0,12)||'User'}</p>
                        <p className="text-sm text-white leading-relaxed">{c.text}</p>
                      </div>
                    </div>
                  ))}
            </div>
            <div className="px-4 py-3 border-t border-zinc-800 flex gap-3 items-center flex-shrink-0">
              <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder="Tulis komentar..." disabled={sending}
                className="flex-1 bg-zinc-800 border border-zinc-700 rounded-full px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-[#3c2aff] disabled:opacity-50"/>
              <button onClick={send} disabled={!text.trim()||!user||sending}
                className="w-10 h-10 rounded-full bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center disabled:opacity-40 active:scale-95">
                {sending
                  ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spinner"></div>
                  : <svg className="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>}
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ══════════════════ REEL ITEM ══════════════════ */
    const ReelItem = ({reel, muted, toggleMute, onLike, user, clincoUser, isActive}) => {
      const vidRef = useRef(null);
      const [playing, setPlaying] = useState(false);
      const [overlay, setOverlay] = useState(false);
      const [showCmt, setShowCmt] = useState(false);
      const [liked, setLiked] = useState(false);
      const [likes, setLikes] = useState(reel.likes_count||0);
      const [liking, setLiking] = useState(false);

      useEffect(()=>{
        if(!vidRef.current) return;
        if(isActive){ vidRef.current.play().then(()=>setPlaying(true)).catch(()=>setPlaying(false)); }
        else { vidRef.current.pause(); setPlaying(false); }
      },[isActive]);

      const clickVideo = () => {
        if(!vidRef.current) return;
        if(playing){vidRef.current.pause();setPlaying(false);}
        else{vidRef.current.play().then(()=>setPlaying(true)).catch(()=>{});}
        setOverlay(true); setTimeout(()=>setOverlay(false),800);
      };

      const doLike = async () => {
        // no auth needed for testing
        if(liking) return;
        setLiking(true);
        const prev=liked; setLiked(!prev); setLikes(n=>prev?n-1:n+1);
        const uid=clincoUser?.id||user?.uid||user?.email;
        await api.post('videoLike',{user_id:uid,video_id:reel.id});
        setLiking(false);
      };

      const avatarChar=(reel.title||reel.user_id||'V').charAt(0).toUpperCase();
      const username=reel.user_id?`@${reel.user_id.substring(0,10)}`:'@clincoo';

      return (<>
        <div className="h-full w-full snap-start relative bg-black flex items-center justify-center overflow-hidden">
          {reel.video_url
            ? <video ref={vidRef} src={reel.video_url} className="w-full h-full object-cover" loop muted={muted} playsInline onClick={clickVideo}/>
            : <div className="w-full h-full bg-gradient-to-br from-zinc-900 to-black flex items-center justify-center">
                <div className="text-center text-gray-600"><Icon name="Film" className="w-16 h-16 mx-auto mb-3 opacity-30"/><p className="text-sm">Video tidak tersedia</p></div>
              </div>}
          {overlay && (
            <div className="absolute inset-0 flex items-center justify-center bg-black/10 pointer-events-none">
              <div className="p-4 rounded-full bg-black/60 text-white">
                {playing
                  ? <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                  : <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>}
              </div>
            </div>
          )}
          {/* Right actions */}
          <div className="absolute right-3 flex flex-col items-center gap-4 z-10" style={{bottom:'calc(56px + env(safe-area-inset-bottom) + 16px)'}}>
            <div className="w-10 h-10 rounded-full border-2 border-white overflow-hidden relative mb-1 flex-shrink-0">
              <div className="w-full h-full bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center text-white text-xs font-bold">{avatarChar}</div>
              <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-red-500 rounded-full w-4 h-4 flex items-center justify-center text-white text-[10px] font-bold">+</div>
            </div>
            <button onClick={doLike} className="flex flex-col items-center active:scale-90 transition-transform">
              <div className={`p-2 rounded-full bg-black/40 backdrop-blur-sm ${liked?'text-red-500':'text-white'}`}>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={liked?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
              </div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{fmt(likes)}</span>
            </button>
            <button onClick={()=>setShowCmt(true)} className="flex flex-col items-center active:scale-90 transition-transform">
              <div className="p-2 rounded-full bg-black/40 backdrop-blur-sm text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></svg>
              </div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{fmt(reel.comments_count)}</span>
            </button>
            <button className="flex flex-col items-center active:scale-90 transition-transform">
              <div className="p-2 rounded-full bg-black/40 backdrop-blur-sm text-white"><Icon name="Share2" className="w-6 h-6"/></div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{fmt(reel.shares_count)}</span>
            </button>
            <button onClick={toggleMute} className="flex flex-col items-center active:scale-90 transition-transform">
              <div className="p-2 rounded-full bg-black/40 backdrop-blur-sm text-white">
                {muted?<Icon name="VolumeX" className="w-5 h-5"/>:<Icon name="Volume2" className="w-5 h-5"/>}
              </div>
            </button>
            <div className="w-9 h-9 rounded-full bg-zinc-800 border-4 border-zinc-700 flex items-center justify-center animate-[spin_4s_linear_infinite] mt-1 shadow-lg">
              <div className="w-3 h-3 rounded-full bg-black border border-zinc-500"></div>
            </div>
          </div>
          {/* Bottom info */}
          <div className="absolute left-4 right-16 z-10 text-left pointer-events-none" style={{bottom:'calc(56px + env(safe-area-inset-bottom) + 16px)'}}>
            <h4 className="font-bold text-base drop-shadow-md mb-1 pointer-events-auto select-none">{username}</h4>
            <p className="text-sm line-clamp-3 text-gray-200 leading-snug drop-shadow-md pointer-events-auto mb-2 select-none">{reel.title||''} {reel.description||''}</p>
            {reel.tags&&reel.tags.length>0&&(
              <div className="flex flex-wrap gap-1">
                {reel.tags.slice(0,3).map((t,i)=><span key={i} className="text-[#8a7dff] text-xs font-semibold drop-shadow-md pointer-events-auto">#{t}</span>)}
              </div>
            )}
          </div>
        </div>
        {showCmt && <CommentSheet video={reel} onClose={()=>setShowCmt(false)} user={user} clincoUser={clincoUser}/>}
      </>);
    };

    /* ══════════════════ AUTH SHEET ══════════════════ */
    const AuthBottomSheet = ({onClose}) => {
      const [mode, setMode] = useState('options');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const googleLogin = async () => {
        setLoading(true); setError('');
        try {
          const {GoogleAuthProvider,signInWithPopup}=await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
          await signInWithPopup(firebaseAuthInstance, new GoogleAuthProvider());
        } catch { setError('Gagal masuk dengan Google.'); setLoading(false); }
      };

      const emailSubmit = async (e) => {
        e.preventDefault(); setLoading(true); setError('');
        try {
          const {signInWithEmailAndPassword,createUserWithEmailAndPassword}=await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
          if(mode==='email-login') await signInWithEmailAndPassword(firebaseAuthInstance,email,password);
          else await createUserWithEmailAndPassword(firebaseAuthInstance,email,password);
        } catch(err) {
          if(['auth/invalid-credential','auth/user-not-found','auth/wrong-password'].includes(err.code)) setError('Email atau password salah.');
          else if(err.code==='auth/email-already-in-use') setError('Email sudah terdaftar.');
          else if(err.code==='auth/weak-password') setError('Password minimal 6 karakter.');
          else setError('Terjadi kesalahan. Silakan coba lagi.');
          setLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[100] flex flex-col justify-end">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose}></div>
          <div className="w-full max-w-md mx-auto bg-zinc-900 rounded-t-3xl p-6 relative z-10 animate-slide-up shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-zinc-800">
            <div className="w-12 h-1.5 bg-zinc-700 rounded-full mx-auto mb-6"></div>
            {mode==='options' && (<>
              <div className="text-center mb-8">
                <h2 className="text-2xl font-bold text-white mb-2">Masuk ke Clincoo</h2>
                <p className="text-gray-400 text-sm">Simpan progres dan terhubung dengan komunitas</p>
              </div>
              {error && <div className="text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg border border-red-400/20 mb-4">{error}</div>}
              <div className="flex flex-col gap-3">
                <button onClick={googleLogin} disabled={loading} className="w-full flex items-center justify-center gap-3 bg-white text-black font-semibold py-3.5 rounded-xl active:scale-[0.98] transition-all">
                  {loading?<div className="w-5 h-5 border-2 border-black border-t-transparent rounded-full spinner"></div>:<><Icon name="Google" className="w-5 h-5"/>Lanjutkan dengan Google</>}
                </button>
                <button onClick={()=>{setMode('email-login');setError('');}} className="w-full flex items-center justify-center gap-3 bg-zinc-800 text-white font-semibold py-3.5 rounded-xl hover:bg-zinc-700 active:scale-[0.98] transition-all">
                  <Icon name="Mail" className="w-5 h-5"/>Lanjutkan dengan Email
                </button>
              </div>
              <p className="text-center text-xs text-gray-500 mt-6">Dengan mendaftar, Anda menyetujui Syarat dan Ketentuan kami.</p>
            </>)}
            {(mode==='email-login'||mode==='email-signup') && (<>
              <div className="flex items-center mb-6">
                <button onClick={()=>setMode('options')} className="p-2 -ml-2 rounded-full hover:bg-zinc-800 text-white"><Icon name="ArrowLeft" className="w-6 h-6"/></button>
                <h2 className="text-xl font-bold text-white ml-2">{mode==='email-login'?'Masuk dengan Email':'Daftar dengan Email'}</h2>
              </div>
              <form onSubmit={emailSubmit} className="flex flex-col gap-4">
                <div className="relative">
                  <input type="email" id="em" className="auth-input block w-full px-4 py-3.5 bg-zinc-800 border border-zinc-700 rounded-xl text-white appearance-none focus:outline-none focus:border-[#3c2aff] focus:ring-1 focus:ring-[#3c2aff] transition-all" placeholder=" " value={email} onChange={e=>setEmail(e.target.value)} required/>
                  <label htmlFor="em" className="auth-label absolute left-4 top-3.5 text-gray-500 transition-all pointer-events-none bg-zinc-800 px-1">Email</label>
                </div>
                <div className="relative">
                  <input type="password" id="pw" className="auth-input block w-full px-4 py-3.5 bg-zinc-800 border border-zinc-700 rounded-xl text-white appearance-none focus:outline-none focus:border-[#3c2aff] focus:ring-1 focus:ring-[#3c2aff] transition-all" placeholder=" " value={password} onChange={e=>setPassword(e.target.value)} required/>
                  <label htmlFor="pw" className="auth-label absolute left-4 top-3.5 text-gray-500 transition-all pointer-events-none bg-zinc-800 px-1">Password</label>
                </div>
                {error && <div className="text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg border border-red-400/20">{error}</div>}
                <button type="submit" disabled={loading} className="w-full mt-2 bg-gradient-to-r from-[#3c2aff] to-[#8a7dff] text-white font-bold py-3.5 rounded-xl shadow-[0_4px_14px_0_rgba(60,42,255,0.39)] active:scale-[0.98] transition-all flex justify-center items-center h-12">
                  {loading?<div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full spinner"></div>:(mode==='email-login'?'Masuk':'Daftar')}
                </button>
              </form>
              <div className="mt-6 text-sm text-center text-gray-400">
                {mode==='email-login'?'Belum punya akun? ':'Sudah punya akun? '}
                <button onClick={()=>setMode(mode==='email-login'?'email-signup':'email-login')} className="text-[#8a7dff] font-semibold hover:underline focus:outline-none">
                  {mode==='email-login'?'Daftar sekarang':'Masuk di sini'}
                </button>
              </div>
            </>)}
          </div>
        </div>
      );
    };

    /* ══════════════════ MAIN APP ══════════════════ */
    const ClincooApp = () => {
      const [user,setUser]=useState(null);
      const [clincoUser,setClincoUser]=useState(null);
      const [isAuthChecking,setIsAuthChecking]=useState(true);
      const [showAuthSheet,setShowAuthSheet]=useState(false);
      const [showUpload,setShowUpload]=useState(false);
      const [pendingTab,setPendingTab]=useState(null);
      const [scrollDir,setScrollDir]=useState('up');
      const [lastScrollY,setLastScrollY]=useState(0);
      const [isScrolled,setIsScrolled]=useState(false);
      const [activeCategory,setActiveCategory]=useState('Semua');
      const [activeTab,setActiveTab]=useState('home');
      const [profileTab,setProfileTab]=useState('Beranda');
      const [muted,setMuted]=useState(true);
      const [reels,setReels]=useState([]);
      const [reelsLoading,setReelsLoading]=useState(true);
      const [homeFeed,setHomeFeed]=useState([]);
      const [homeFeedLoading,setHomeFeedLoading]=useState(true);
      const [activeReelIdx,setActiveReelIdx]=useState(0);
      const [profileVideos,setProfileVideos]=useState([]);
      const [profileLoading,setProfileLoading]=useState(false);
      const containerRef=useRef(null);
      const reelContainerRef=useRef(null);

      const chatList=[
        {id:1,name:'Budi Santoso',message:'Kapan kita mulai mabar bang?',time:'10:32',unread:2,online:true,avatar:'B'},
        {id:2,name:'Siti Aminah',message:'File project kemarin udah aku kirim ya.',time:'09:15',unread:0,online:false,avatar:'S'},
        {id:3,name:'Gamer Squad',message:'Andi: Gas rank malam ini!',time:'Kemarin',unread:5,online:false,avatar:'G'},
        {id:4,name:'Joko',message:'Ok mantap!',time:'Kemarin',unread:0,online:true,avatar:'J'},
        {id:5,name:'Rina',message:'Hahahaha lucu banget videonya 😂',time:'Senin',unread:0,online:false,avatar:'R'},
      ];

      const loadReels=useCallback(async()=>{ setReelsLoading(true); const d=await api.get('videoFeed?page=1&limit=20'); setReels(d.videos||[]); setReelsLoading(false); },[]);
      const loadHome=useCallback(async()=>{ setHomeFeedLoading(true); const d=await api.get('videoExplore?page=1&limit=12'); setHomeFeed(d.videos||[]); setHomeFeedLoading(false); },[]);
      const loadProfile=useCallback(async(uid)=>{ if(!uid) return; setProfileLoading(true); const d=await api.get(`userProfile?user_id=${uid}`); setProfileVideos(d.videos||[]); setProfileLoading(false); },[]);

      useEffect(()=>{ loadReels(); loadHome(); },[]);

      // ── BYPASS LOGIN: auto-create mock user for testing ──
      useEffect(()=>{
        const setupTestUser=async()=>{
          const testUid='test_user_'+Date.now().toString().slice(-6);
          const pd=await api.get(`userProfile?user_id=${testUid}`);
          if(pd.success&&pd.user){
            setClincoUser(pd.user);
            setProfileVideos(pd.videos||[]);
          } else {
            const reg=await api.post('authRegister',{email:'test@clincoo.app',username:'tester'+Date.now().toString().slice(-4),display_name:'Tester'});
            if(reg.success) setClincoUser(reg.user);
          }
          setUser({uid:testUid,email:'test@clincoo.app',displayName:'Tester'});
          setIsAuthChecking(false);
          const splash=document.getElementById('static-splash-screen');
          if(splash){splash.style.opacity='0';setTimeout(()=>splash.remove(),500);}
        };
        setupTestUser();
      },[]);

      // Auth gate disabled for testing
      // useEffect(()=>{
      //   if(!isAuthChecking&&!user&&(activeTab==='profile'||activeTab==='chat')){ setPendingTab(activeTab); setActiveTab('home'); setShowAuthSheet(true); }
      // },[user,activeTab,isAuthChecking]);

      useEffect(()=>{
        if(user&&pendingTab){ setActiveTab(pendingTab); setPendingTab(null); setShowAuthSheet(false); }
        else if(user&&showAuthSheet) setShowAuthSheet(false);
      },[user,pendingTab,showAuthSheet]);

      const logout=()=>{ setActiveTab('home'); };

      const changeTab=(tab)=>{
        if(tab==='upload'){ setShowUpload(true); return; }
        setActiveTab(tab); if(tab==='reels') setActiveReelIdx(0); if(tab==='profile'&&clincoUser) loadProfile(clincoUser.id);
      };

      useEffect(()=>{
        const el=containerRef.current; if(!el) return;
        const onScroll=()=>{
          const y=el.scrollTop;
          if(y<=0){setScrollDir('up');setIsScrolled(false);setLastScrollY(y);return;}
          if(Math.abs(y-lastScrollY)<10) return;
          setScrollDir(y>lastScrollY&&y>60?'down':'up');
          setIsScrolled(y>10); setLastScrollY(y);
        };
        el.addEventListener('scroll',onScroll,{passive:true});
        return()=>el.removeEventListener('scroll',onScroll);
      },[lastScrollY]);

      useEffect(()=>{
        const el=reelContainerRef.current; if(!el) return;
        const onScroll=()=>{ const idx=Math.round(el.scrollTop/el.clientHeight); setActiveReelIdx(idx); };
        el.addEventListener('scroll',onScroll,{passive:true});
        return()=>el.removeEventListener('scroll',onScroll);
      },[activeTab]);

      const categories=['Semua','Video','Reels','Gaming','Musik','Live','Podcast'];

      if(isAuthChecking) return null;

      return (
        <div className="flex justify-center bg-gray-900 min-h-screen font-sans">

                </div>

                <div className="flex items-center justify-between px-4 h-14 w-full max-w-md mx-auto">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center shadow-[0_0_10px_rgba(60,42,255,0.7)]">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5.14v13.72c0 .79.87 1.27 1.54.84l11-6.86a1 1 0 0 0 0-1.68l-11-6.86A1 1 0 0 0 8 5.14z"/></svg>
                    </div>
                    <h1 className="text-lg font-bold tracking-[0.15em]" style={{fontFamily:"'Cinzel Decorative',serif"}}>CLINCOO</h1>

                <div style={{paddingTop:'48px'}}>

                        </div>

                            <div className="px-4 mb-2 flex items-center gap-2">

                                  </div>
                                </div>
                                <div className="flex gap-3 p-4">
                                  <div className="w-9 h-9 rounded-full bg-gradient-to-br from-[#3c2aff] to-[#8a7dff] flex items-center justify-center text-white text-xs font-bold flex-shrink-0">{(v.title||'V').charAt(0).toUpperCase()}</div>
                                  <div className="flex-1">

                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </>)}
                </div>
              )}

              {/* REELS */}
              {activeTab==='reels' && (

                          <button onClick={()=>changeTab('upload')} className="mt-2 px-6 py-3 bg-gradient-to-r from-[#3c2aff] to-[#8a7dff] text-white text-sm font-bold rounded-full shadow-[0_4px_14px_rgba(60,42,255,0.4)]">Upload Video Pertama</button>
                        </div>
                      : reels.map((r,idx)=>(
                          <ReelItem key={r.id||idx} reel={r} muted={muted} toggleMute={()=>setMuted(!muted)}
                            onLike={a=>{if(a==='auth')setShowAuthSheet(true);}} user={user} clincoUser={clincoUser} isActive={idx===activeReelIdx}/>
                        ))}
                </div>
              )}

              {/* CHAT */}
              {activeTab==='chat' && (
                <div className="flex flex-col w-full h-full pb-16">

                    <div key={chat.id} className="flex items-center gap-4 py-3 px-4 active:bg-gray-900 transition-colors cursor-pointer select-none">

                      <div className="grid grid-cols-3 gap-[2px] py-2">
                        {profileVideos.length===0
                          ? <div className="col-span-3 flex flex-col items-center py-10 gap-2 text-gray-500"><Icon name="Shorts" className="w-10 h-10 opacity-20"/><p className="text-sm">Belum ada reels</p></div>
                          : profileVideos.map((v,i)=>(
                              <div key={v.id||i} onClick={()=>setActiveTab('reels')} className="aspect-[3/4] bg-zinc-800 relative overflow-hidden cursor-pointer active:opacity-80">
                                {v.thumbnail_url?<img src={v.thumbnail_url} className="w-full h-full object-cover"/>:<div className="w-full h-full flex items-center justify-center"><Icon name="Film" className="w-6 h-6 text-zinc-600"/></div>}
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                                <div className="absolute bottom-2 left-1.5 right-1.5 text-[11px] font-medium text-white line-clamp-2 drop-shadow-md">{v.title||''}</div>
                              </div>
                            ))}
                      </div>
                    )}
                    {profileTab==='Postingan' && (
                      <div className="flex flex-col items-center justify-center min-h-[200px] text-gray-500 gap-3 py-10">
                        <Icon name="MessageSquare" className="w-10 h-10 opacity-20"/>
                        <p className="text-sm">Belum ada postingan</p>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </main>

            {/* BOTTOM NAV */}
            <nav className={`fixed bottom-0 w-full max-w-md bg-black z-50 transition-transform duration-300 ${scrollDir==='down'&&activeTab!=='reels'?'translate-y-full':'translate-y-0'}`}>
              <div className="flex items-center justify-around h-14 px-2 relative border-t border-white/10">
                <button onClick={()=>changeTab('home')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab==='home'?'text-white':'text-zinc-500 hover:text-zinc-300'}`}>
                  <Icon name="Home" className="w-6 h-6"/>
                </button>
                <button onClick={()=>changeTab('reels')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab==='reels'?'text-white':'text-zinc-500 hover:text-zinc-300'}`}>
                  <Icon name="PlaySquare" className="w-6 h-6"/>
                </button>
                <div className="flex-1 flex justify-center relative items-center h-full">
                  <button onClick={()=>changeTab('upload')} className="w-12 h-12 rounded-full flex items-center justify-center relative overflow-hidden group shadow-[0_0_15px_rgba(60,42,255,0.5)] active:scale-95 transition-transform" style={{backgroundColor:'#3c2aff'}}>
                    <div className="absolute inset-0 shine-effect"></div>
                    <div className="relative z-10 flex items-center justify-center"><Icon name="Plus" className="w-7 h-7 text-white bounce-on-shine"/></div>
                  </button>
                </div>
                <button onClick={()=>changeTab('chat')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab==='chat'?'text-white':'text-zinc-500 hover:text-zinc-300'}`}>
                  <Icon name="MessageCircle" className="w-6 h-6"/>
                </button>
                <button onClick={()=>changeTab('profile')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab==='profile'?'text-white':'text-zinc-500 hover:text-zinc-300'}`}>
                  {user?.photoURL
                    ? <img src={user.photoURL} className={`w-7 h-7 rounded-full object-cover ${activeTab==='profile'?'ring-2 ring-[#3c2aff]':''}`} alt="avatar"/>
                    : <Icon name="User" className="w-6 h-6"/>}
                </button>
              </div>
              <div style={{height:'env(safe-area-inset-bottom)'}}></div>
            </nav>
          </div>

          {/* Auth modal hidden for testing */}
          {showUpload && <UploadModal onClose={()=>setShowUpload(false)} user={user} clincoUser={clincoUser} onUploaded={()=>{loadReels();loadHome();if(clincoUser)loadProfile(clincoUser.id);}}/>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<ClincooApp/>);
  </script>
</body>
</html>
