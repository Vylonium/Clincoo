<!DOCTYPE html>

<head>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233c2aff'/%3E%3Cstop offset='100%25' stop-color='%238a7dff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cg transform='translate(3, 4)'%3E%3Cpath d='M8 5.14v13.72c0 .79.87 1.27 1.54.84l11-6.86a1 1 0 0 0 0-1.68l-11-6.86A1 1 0 0 0 8 5.14z' fill='white' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/g%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>
   .no-scrollbar::-webkit-scrollbar { display: none; }
   .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
   
   .custom-scrollbar::-webkit-scrollbar { width: 4px; }
   .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
   .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
   
    @keyframes shine {
      0% { transform: translateX(-200%) skewX(-30deg); }
      15% { transform: translateX(200%) skewX(-30deg); }
      100% { transform: translateX(200%) skewX(-30deg); }
    }
   .shine-effect {
      position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-30deg); animation: shine 4s infinite linear;
    }
    
    @keyframes double-bounce {
      0%, 5%, 15%, 100% { transform: translateY(0); }
      7.5% { transform: translateY(-4px); }
      10% { transform: translateY(0); }
      12.5% { transform: translateY(-2px); }
    }
   .bounce-on-shine { animation: double-bounce 4s infinite linear; }
   
    @keyframes marquee {
      0% { transform: translate3d(100%, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }
   .animate-marquee {
      animation: marquee 12s linear infinite;
   }
    
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .animate-slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    * { -webkit-tap-highlight-color: transparent; }

    #static-splash-screen {
      position: fixed;
      inset: 0;
      background-color: #111827;
      z-index: 9999;
      display: flex;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    #static-splash-container {
      width: 100%;
      max-width: 28rem;
      background-color: #000000;
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    /* Auth input animations */
    .auth-input:focus ~ .auth-label,
    .auth-input:not(:placeholder-shown) ~ .auth-label {
      transform: translateY(-1.5rem) scale(0.85);
      color: #8a7dff;
    }
  </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased m-0 p-0">

    <div id="static-splash-container">

          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <script type="text/babel">

    const firebaseConfig = {

        User: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        MoreVertical: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>,

        Bookmark: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2-2v16z"/></svg>,
        Link: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
        CheckBadge: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>,
        ThumbsUp: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>,
        MessageSquare: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
        Shorts: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M10 14.65v-5.3L15 12l-5 2.65zm7.77-4.27l-1.2-.5.5-1.2c.67-1.63-.12-3.5-1.75-4.17s-3.5.12-4.17 1.75L9.62 9.87l1.2.5-.5 1.2c-.67 1.63.12 3.5 1.75 4.17s3.5-.12 4.17-1.75l1.53-3.61zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>,
        LogOut: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        Google: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" className={className}><path fill="#EA4335" d="M12 4.782c2.09 0 3.967.72 5.44 2.112l4.072-4.072C19.043 1.05 15.776 0 12 0 7.37 0 3.35 2.59 1.258 6.405l4.78 3.71C7.218 7.027 9.4 4.782 12 4.782z"/><path fill="#4285F4" d="M23.49 12.275c0-.85-.075-1.667-.217-2.463H12v4.66h6.446c-.277 1.51-1.125 2.79-2.38 3.633l3.834 2.973c2.24-2.065 3.59-5.11 3.59-8.803z"/><path fill="#FBBC05" d="M6.038 10.115c-.244.726-.383 1.505-.383 2.31s.14 1.584.383 2.31l-4.78 3.71C.486 16.924 0 14.53 0 12c0-2.53.486-4.924 1.258-6.435l4.78 3.715z"/><path fill="#34A853" d="M12 24c3.776 0 6.942-1.25 9.255-3.385l-3.834-2.973c-1.252.84-2.856 1.34-5.42 1.34-2.6 0-4.782-2.245-5.96-5.333l-4.78 3.71C3.35 21.41 7.37 24 12 24z"/></svg>,
        Mail: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
        ArrowLeft: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      };
      return icons[name] || null;
    };

    const ReelItem = ({ reel, onLike, onRemix, muted, toggleMute }) => {
      const videoRef = useRef(null);
      const [playing, setPlaying] = useState(false);
      const [showPlayOverlay, setShowPlayOverlay] = useState(false);

      useEffect(() => {
        if (videoRef.current) {
          const playPromise = videoRef.current.play();
          if (playPromise !== undefined) {
            playPromise.then(() => setPlaying(true)).catch(() => setPlaying(false));
          }
        }
      }, []);

      const handleVideoClick = () => {
        if (videoRef.current) {
          if (playing) {
            videoRef.current.pause();
            setPlaying(false);
          } else {
            const playPromise = videoRef.current.play();
            if (playPromise !== undefined) {
              playPromise.then(() => setPlaying(true)).catch(() => setPlaying(false));
            } else {
              setPlaying(true);
            }
          }
          setShowPlayOverlay(true);
          setTimeout(() => setShowPlayOverlay(false), 800);
        }
      };

      const formatCount = (count) => {
        if (count >= 1000) return (count / 1000).toFixed(1) + 'K';
        return count;
      };

      return (
        <div className="h-full w-full snap-start relative bg-black flex items-center justify-center overflow-hidden">
          <video
            ref={videoRef}
            src={reel.videoUrl}
            className="w-full h-full object-cover"
            loop
            muted={muted}
            playsInline
            onClick={handleVideoClick}
          />
          
          {showPlayOverlay && (
            <div className="absolute inset-0 flex items-center justify-center bg-black/10 pointer-events-none transition-opacity duration-300">
              <div className="p-4 rounded-full bg-black/60 text-white animate-ping">
                {playing ? (
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                ) : (
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                )}
              </div>
            </div>
          )}

          <div className="absolute right-3 flex flex-col items-center gap-4 z-10" style={{ bottom: 'calc(56px + env(safe-area-inset-bottom) + 16px)' }}>
            <div className="w-10 h-10 rounded-full border-2 border-white overflow-hidden relative mb-1">
              <img src={`https://placehold.co/44x44/333/fff?text=${reel.username.charAt(1).toUpperCase()}`} className="w-full h-full object-cover" alt="avatar" />
              <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-red-500 rounded-full w-4 h-4 flex items-center justify-center text-white text-[10px] font-bold">+</div>
            </div>

            <button onClick={() => onLike(reel.id)} className="flex flex-col items-center group active:scale-90 transition-transform">
              <div className={`p-2 rounded-full bg-black/40 backdrop-blur-sm ${reel.liked ? 'text-red-500' : 'text-white'}`}>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={reel.liked ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
              </div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{formatCount(reel.likes)}</span>
            </button>

            <button className="flex flex-col items-center active:scale-90 transition-transform">
              <div className="p-2 rounded-full bg-black/40 backdrop-blur-sm text-white">
               <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></svg>
              </div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{formatCount(reel.comments)}</span>
            </button>

            <button onClick={() => onRemix(reel.id)} className="flex flex-col items-center active:scale-90 transition-transform">
              <div className={`p-2 rounded-full transition-all duration-300 ${reel.remixed ? 'bg-[#3c2aff]' : 'bg-black/40 backdrop-blur-sm'}`}>
                <div className="relative w-6 h-6 flex items-center justify-center text-white">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                    <path d="M8 16H3v5"/>
                  </svg>
                  {reel.remixed && (
                    <div className="absolute inset-0 flex items-center justify-center">
                      <svg width="8" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                      </svg>
                    </div>
                  )}
                </div>
              </div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{formatCount(reel.remixes)}</span>
            </button>

            <button className="flex flex-col items-center active:scale-90 transition-transform">
              <div className="p-2 rounded-full bg-black/40 backdrop-blur-sm text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
              </div>
              <span className="text-[11px] font-semibold mt-0.5 drop-shadow-md">{formatCount(reel.shares)}</span>
            </button>          

            <div className="w-9 h-9 rounded-full bg-zinc-800 border-4 border-zinc-700 flex items-center justify-center animate-[spin_4s_linear_infinite] mt-1 shadow-lg">
              <div className="w-3 h-3 rounded-full bg-black border border-zinc-500"></div>
            </div>
          </div>

          <div className="absolute left-4 right-16 z-10 text-left pointer-events-none" style={{ bottom: 'calc(56px + env(safe-area-inset-bottom) + 16px)' }}>
            <h4 className="font-bold text-base drop-shadow-md mb-1 pointer-events-auto select-none">{reel.username}</h4>
            <p className="text-sm line-clamp-3 text-gray-200 leading-snug drop-shadow-md pointer-events-auto mb-3 select-none">
              {reel.description}
            </p>
          </div>
        </div>
      );
    };

    const AuthBottomSheet = ({ onClose }) => {
      const [mode, setMode] = useState('options'); 
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleGoogleLogin = async () => {
        setLoading(true);
        setError('');
        try {
          const { GoogleAuthProvider, signInWithPopup } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
          const provider = new GoogleAuthProvider();
          await signInWithPopup(firebaseAuthInstance, provider);
        } catch (err) {
          console.error(err);
          setError('Gagal masuk dengan Google.');
          setLoading(false);
        }
      };

      const handleEmailSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const { signInWithEmailAndPassword, createUserWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
          
          if (mode === 'email-login') {
            await signInWithEmailAndPassword(firebaseAuthInstance, email, password);
          } else {
            await createUserWithEmailAndPassword(firebaseAuthInstance, email, password);
          }
        } catch (err) {
          console.error(err);
          if(err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
            setError('Email atau password salah.');
          } else if (err.code === 'auth/email-already-in-use') {
            setError('Email sudah terdaftar.');
          } else if (err.code === 'auth/weak-password') {
            setError('Password minimal 6 karakter.');
          } else {
            setError('Terjadi kesalahan. Silakan coba lagi.');
          }
          setLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[100] flex flex-col justify-end">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="w-full max-w-md mx-auto bg-zinc-900 rounded-t-3xl p-6 relative z-10 animate-slide-up shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-zinc-800 flex flex-col">
            
            <div className="w-12 h-1.5 bg-zinc-700 rounded-full mx-auto mb-6"></div>

            {mode === 'options' && (
              <>
                <div className="text-center mb-8">
                  <h2 className="text-2xl font-bold text-white mb-2">Masuk ke Clincoo</h2>
                  <p className="text-gray-400 text-sm">Simpan progres dan terhubung dengan komunitas</p>
                </div>
                
                {error && <div className="text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg border border-red-400/20 mb-4">{error}</div>}

                <div className="flex flex-col gap-3">

                      <div className="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-zinc-800 overflow-hidden flex-shrink-0 p-1 bg-gradient-to-tr from-[#3c2aff] to-[#8a7dff] -mt-8 relative z-20 shadow-lg">
                        <img src="https://placehold.co/150x150/1a1a1a/fff?text=V" alt="Profile" className="w-full h-full object-cover rounded-full border-[3px] border-[#0f0f0f]" />
                      </div>
                      
                      {/* Name and Handle */}
                      <div className="flex flex-col pt-1">
                        <h2 className="text-[22px] font-bold flex items-center gap-1.5 leading-tight">
                          Vinco
                          <Icon name="CheckBadge" className="w-5 h-5 text-[#3c2aff]" />
                        </h2>
                        <div className="text-[13.5px] text-gray-400 flex flex-wrap items-center gap-1 mt-0.5">
                           <span>{user?.email || '@vinconium'}</span>
                           <span className="hidden sm:inline">•</span>
                           <span>590 rb pengikut</span>
                           <span>•</span>
                           <span>274 konten</span>
                        </div>
                      </div>
                    </div>

                    {/* Bio Description */}
                    <p className="mt-3 text-[13.5px] text-gray-300 w-full leading-relaxed line-clamp-2">
                      Mempermudah kerumitan dibalik teknologi & sains :) 
                      <span className="font-bold text-[#8a7dff] cursor-pointer ml-1">...selengkapnya</span>
                    </p>

                    {/* Links */}
                    <div className="mt-2 text-[13.5px] text-[#8a7dff] flex items-center gap-1.5 cursor-pointer font-medium w-full truncate">
                      <Icon name="Link" className="w-4 h-4 text-[#8a7dff] flex-shrink-0"/>
                      <span className="truncate">linktr.ee/vinconium <span className="text-gray-400">dan 3 link lainnya</span></span>
                    </div>

                    {/* Action Buttons */}
                    <div className="flex gap-2 w-full mt-4">
                      <button className="flex-1 bg-white text-black hover:bg-gray-200 py-2 rounded-xl font-bold text-[13px] transition-colors shadow-sm">
                        Edit Profil
                      </button>
                      <button className="flex-1 bg-white/10 hover:bg-white/20 text-white py-2 rounded-xl font-semibold text-[13px] transition-colors">
                        Kelola Konten
                      </button>
                    </div>
                  </div>

                  {/* Profile Navigation Tabs */}
                  <div className="flex border-b border-white/5 mt-1 sticky top-14 bg-[#0f0f0f] z-30 overflow-x-auto no-scrollbar">
                    {['Beranda', 'Video', 'Reels', 'Postingan'].map((tab) => (
                      <button 
                        key={tab} 
                        onClick={() => setProfileTab(tab)} 
                        className={`px-5 py-3.5 font-medium whitespace-nowrap border-b-2 transition-colors text-[14px] ${profileTab === tab ? 'border-[#3c2aff] text-white' : 'border-transparent text-gray-400 hover:text-gray-200'}`}
                      >
                         {tab}
                      </button>
                    ))}
                  </div>

                  <div className="w-full bg-[#0f0f0f] min-h-[400px]">
                    
                    {/* BERANDA TAB */}
                    {profileTab === 'Beranda' && (
                      <div className="py-4">
                        {/* Section: Untuk Anda */}
                        <div className="mb-6">
                           <h3 className="px-4 text-[16px] font-bold mb-3">Untuk Anda</h3>
                           <div className="flex overflow-x-auto gap-3 px-4 pb-2 no-scrollbar">
                             {Array.from({length: 4}).map((_, i) => (
                               <div key={i} className="min-w-[260px] max-w-[260px] flex-shrink-0 cursor-pointer">
                                  <div className="w-full aspect-video bg-zinc-800 rounded-xl overflow-hidden relative mb-2">
                                     <img src={`https://placehold.co/400x225/222/555?text=Video+Untuk+Anda+${i+1}`} className="w-full h-full object-cover" />
                                     <div className="absolute bottom-1.5 right-1.5 bg-black/80 text-[11px] font-medium px-1.5 py-0.5 rounded">12:22</div>
                                  </div>
                                  <h4 className="font-semibold text-[14px] line-clamp-2 leading-tight">Misteri Alam Semesta yang Belum Terpecahkan (Teori Konspirasi)</h4>
                                  <p className="text-[12px] text-gray-400 mt-1">86 rb x ditonton • 8 bulan yang lalu</p>
                               </div>
                             ))}
                           </div>
                        </div>

                        <hr className="border-white/10 my-4" />

                        {/* Section: Shorts/Reels */}
                        <div>
                           <div className="px-4 flex items-center gap-2 mb-3">
                              <Icon name="Shorts" className="w-6 h-6 text-white" />
                              <h3 className="text-[16px] font-bold">Shorts</h3>
                           </div>
                           <div className="flex overflow-x-auto gap-2 px-4 pb-2 no-scrollbar">
                              {Array.from({length: 6}).map((_, i) => (
                               <div key={i} className="w-[140px] aspect-[9/16] bg-zinc-800 rounded-xl overflow-hidden relative flex-shrink-0 cursor-pointer">
                                  <img src={`https://placehold.co/200x350/222/555?text=Short+${i+1}`} className="w-full h-full object-cover" />
                                  <div className="absolute bottom-2 left-2 right-2 text-white font-medium text-[13px] line-clamp-2 drop-shadow-md">
                                     Fakta unik yang jarang diketahui orang 🤔
                                  </div>
                               </div>
                              ))}
                           </div>
                        </div>
                      </div>
                    )}

                    {/* VIDEO TAB */}
                    {profileTab === 'Video' && (
                      <div className="py-2">
                        {/* Filters */}
                        <div className="flex gap-2 px-4 py-2 mb-2">
                          <button className="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-[13px] font-medium transition-colors flex items-center gap-1">
                            Terbaru <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
                          </button>
                          <button className="bg-white text-black px-3 py-1.5 rounded-lg text-[13px] font-medium transition-colors">
                            Khusus pelanggan
                          </button>
                          <button className="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-[13px] font-medium transition-colors">
                            Publik
                          </button>
                        </div>

                        {/* Video List */}
                        <div className="flex flex-col">
                           {Array.from({length: 6}).map((_, i) => (
                             <div key={i} className="flex gap-3 px-4 py-3 active:bg-white/5 cursor-pointer transition-colors">
                                <div className="w-[160px] aspect-video bg-zinc-800 rounded-xl overflow-hidden relative flex-shrink-0">
                                   <img src={`https://placehold.co/320x180/1a1a1a/444?text=Thumbnail+${i+1}`} className="w-full h-full object-cover" />
                                   <div className="absolute bottom-1 right-1 bg-black/80 text-[11px] font-medium px-1.5 py-0.5 rounded">8:13</div>
                                </div>
                                <div className="flex flex-col flex-1 pr-4 relative">
                                   <h4 className="font-semibold text-[14px] leading-tight line-clamp-2">Rahasia Perusahaan Teknologi Terbesar di Dunia</h4>
                                   <div className="text-[12px] text-gray-400 mt-1 flex flex-col gap-0.5">
                                      <span>37 rb x ditonton</span>
                                      <span>2 bulan yang lalu</span>
                                   </div>
                                   <div className="absolute top-0 -right-2 p-1 text-gray-400">
                                      <Icon name="MoreVertical" className="w-4 h-4" />
                                   </div>
                                </div>
                             </div>
                           ))}
                        </div>
                      </div>
                    )}

                    {/* REELS/SHORTS TAB */}
                    {profileTab === 'Reels' && (
                      <div className="py-2">
                        {/* Filters */}
                        <div className="flex gap-2 px-4 py-2 mb-2">
                          <button className="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-[13px] font-medium transition-colors flex items-center gap-1">
                            Terbaru <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
                          </button>
                          <button className="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-[13px] font-medium transition-colors">
                            Terpopuler
                          </button>
                        </div>
                        
                        <div className="grid grid-cols-3 gap-[2px]">
                           {Array.from({length: 12}).map((_, i) => (
                             <div key={i} className="aspect-[3/4] bg-zinc-800 relative group overflow-hidden cursor-pointer">
                                <img src={`https://placehold.co/200x266/1a1a1a/444?text=Reel+${i+1}`} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-80"></div>
                                <div className="absolute bottom-2 left-2 flex flex-col text-white text-[13px] font-semibold drop-shadow-md pr-6">
                                   <span className="line-clamp-2 leading-tight mb-1">Eksperimen gila yang pernah ada</span>
                                   <span className="text-[11px] font-medium text-gray-200">1,2 jt x ditonton</span>
                                </div>
                                <div className="absolute top-1 right-1 p-1">
                                   <Icon name="MoreVertical" className="w-4 h-4 text-white drop-shadow-md" />
                                </div>
                             </div>
                           ))}
                        </div>
                      </div>
                    )}

                    {/* POSTINGAN TAB */}
                    {profileTab === 'Postingan' && (
                      <div className="py-2 bg-[#0f0f0f]">
                         {Array.from({length: 3}).map((_, i) => (
                            <div key={i} className="border-b border-white/10 pb-4 mb-4">
                               <div className="px-4 flex items-start gap-3">
                                  <img src="https://placehold.co/40x40/1a1a1a/fff?text=V" className="w-9 h-9 rounded-full object-cover" />
                                  <div className="flex-1">
                                     <div className="flex items-center gap-1.5">
                                        <span className="font-semibold text-[14px]">Vinco</span>
                                        <span className="text-[12px] text-gray-400">11 hari yang lalu</span>
                                     </div>
                                     <p className="text-[14px] mt-1.5 leading-relaxed">
                                        Berang-berang hanyalah kapibara yang lulus S1 Teknik Sipil. Kalian yang mana?
                                     </p>
                                  </div>
                                  <Icon name="MoreVertical" className="w-5 h-5 text-gray-400" />
                               </div>
                               
                               <div className="mt-3 mx-4 aspect-square bg-zinc-900 rounded-xl overflow-hidden relative">
                                  <img src={`https://placehold.co/400x400/222/555?text=Meme+Post+${i+1}`} className="w-full h-full object-cover" />
                               </div>
                               
                               <div className="px-4 mt-3 flex items-center justify-between text-gray-400">
                                  <div className="flex items-center gap-4">
                                     <button className="flex items-center gap-1.5 hover:text-white transition-colors">
                                        <Icon name="ThumbsUp" className="w-5 h-5" />
                                        <span className="text-[13px] font-medium">3,3 rb</span>
                                     </button>
                                     <button className="flex items-center gap-1.5 hover:text-white transition-colors rotate-180">
                                        <Icon name="ThumbsUp" className="w-5 h-5" />
                                     </button>
                                  </div>
                                  <button className="flex items-center gap-1.5 hover:text-white transition-colors">
                                     <Icon name="MessageSquare" className="w-5 h-5" />
                                     <span className="text-[13px] font-medium">60</span>
                                  </button>
                               </div>
                            </div>
                         ))}
                      </div>
                    )}
                  </div>

                </div>
              )}
            </main>
            
            <nav className={`fixed bottom-0 w-full max-w-md bg-black z-50 transition-transform duration-300 ease-in-out ${scrollDirection === 'down' && activeTab !== 'reels' ? 'translate-y-full' : 'translate-y-0'}`}>
              <div className="flex items-center justify-around h-14 px-2 relative border-t border-white/10">
                <button onClick={() => handleTabChange('home')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab === 'home'? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>
                  <Icon name="Home" className="w-6 h-6" />
                </button>
                <button onClick={() => handleTabChange('reels')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab === 'reels'? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>
                  <Icon name="PlaySquare" className="w-6 h-6" />
                </button>
                
                {/* Completed the cut-off Create Button */}
                <div className="flex-1 flex justify-center relative items-center h-full">
                  <button className="w-12 h-12 rounded-full flex items-center justify-center relative overflow-hidden group shadow-[0_0_15px_rgba(60,42,255,0.5)] active:scale-95 transition-transform" style={{ backgroundColor: '#3c2aff' }}>
                    <div className="absolute inset-0 shine-effect"></div>
                    <div className="relative z-10 flex items-center justify-center">
                      <Icon name="Plus" className="w-7 h-7 text-white bounce-on-shine" />
                    </div>
                  </button>
                </div>

                <button onClick={() => handleTabChange('chat')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab === 'chat'? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>
                  <div className="relative">
                    <Icon name="MessageCircle" className="w-6 h-6" />
                    <div className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-black"></div>
                  </div>
                </button>
                <button onClick={() => handleTabChange('profile')} className={`h-full flex-1 flex justify-center items-center transition-colors active:bg-gray-800 rounded-lg ${activeTab === 'profile'? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>
                  <Icon name="User" className="w-6 h-6" />
                </button>
              </div>
            </nav>

            {showAuthSheet && <AuthBottomSheet onClose={() => { setShowAuthSheet(false); setPendingTab(null); }} />}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ClincooApp />);
  </script>
</body>
</html>
